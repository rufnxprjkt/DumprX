name: DumprX Firmware Dump

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: 'Firmware URL / link (direct, mega.nz, mediafire, gdrive, onedrive, androidfilehost)'
        required: true
        type: string

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        
      - name: Free Disk Space
        if: false
        uses: endersonmenezes/free-disk-space@v3  # Use @main for latest, @v3 for stable
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          #remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          #remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"  # Use 'rmz' for faster deletion (default: 'rm')
          rmz_version: "3.1.1"  # Required when rm_cmd is 'rmz'
          testing: false

      - name: Setup more Swap
        uses: thejerrybao/setup-swap-space@v1   # or pierotofy/set-swap-space
        with:
          swap-size-gb: 15

      - name: Install dependencies
        run: |
          chmod +x setup.sh
          ./setup.sh
          
      - name: Configure GitHub upload credentials
        run: |
          echo "${{ secrets.GH_TOKEN }}" > .github_token
          echo "${{ github.actor }}" > .github_orgname
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run DumprX
        run: |
          chmod +x dumper.sh
          ./dumper.sh "${{ inputs.firmware_url }}"
